mutation CreatePost(
  $id: UUID
  $tenantId: UUID!
  $communityId: UUID
  $membershipId: UUID!
  $authorUserId: UUID
  $authorUsername: String! = "vyb_user"
  $authorName: String! = "Vyb Student"
  $authorEmail: String
  $isAnonymous: Boolean! = false
  $placement: String! = "feed"
  $kind: String!
  $title: String
  $body: String!
  $mediaUrl: String
  $storagePath: String
  $mediaMimeType: String
  $mediaSizeBytes: Int64
  $location: String
  $status: String!
) @auth(level: NO_ACCESS) @transaction {
  post_insert(
    data: {
      id: $id
      tenantId: $tenantId
      communityId: $communityId
      membershipId: $membershipId
      authorUserId: $authorUserId
      authorUsername: $authorUsername
      authorName: $authorName
      authorEmail: $authorEmail
      isAnonymous: $isAnonymous
      placement: $placement
      kind: $kind
      title: $title
      body: $body
      mediaUrl: $mediaUrl
      storagePath: $storagePath
      mediaMimeType: $mediaMimeType
      mediaSizeBytes: $mediaSizeBytes
      location: $location
      status: $status
      visibility: "tenant"
      publishedAt_expr: "request.time"
      createdAt_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  )
}

mutation CreatePostMedia(
  $tenantId: UUID!
  $postId: UUID!
  $storagePath: String!
  $mediaType: String!
  $mimeType: String!
  $sizeBytes: Int64!
  $width: Int
  $height: Int
  $durationMs: Int
) @auth(level: NO_ACCESS) @transaction {
  postMedia_insert(
    data: {
      tenantId: $tenantId
      postId: $postId
      storagePath: $storagePath
      mediaType: $mediaType
      mimeType: $mimeType
      sizeBytes: $sizeBytes
      width: $width
      height: $height
      durationMs: $durationMs
      processingStatus: "ready"
      createdAt_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  )
}

