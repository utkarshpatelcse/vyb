query ListFeedByTenant($tenantId: UUID!, $placement: String! = "feed", $limit: Int!) @auth(level: NO_ACCESS) {
  posts(
    where: {
      tenantId: { eq: $tenantId }
      placement: { eq: $placement }
      status: { eq: "published" }
      deletedAt: { isNull: true }
    }
    orderBy: [{ createdAt: DESC }]
    limit: $limit
  ) {
    id
    tenantId
    communityId
    membershipId
    authorUserId
    authorUsername
    authorName
    authorEmail
    isAnonymous
    placement
    kind
    title
    body
    mediaUrl
    storagePath
    mediaMimeType
    mediaSizeBytes
    location
    status
    createdAt
  }
}

