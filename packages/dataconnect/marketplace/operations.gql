query ListMarketListingsByTenant($tenantId: UUID!, $limit: Int!) @auth(level: NO_ACCESS) {
  marketListings(
    where: {
      tenantId: { eq: $tenantId }
      status: { eq: "active" }
      deletedAt: { isNull: true }
    }
    orderBy: [{ createdAt: DESC }]
    limit: $limit
  ) {
    id
    tenantId
    sellerUserId
    sellerUsername
    sellerName
    sellerRole
    title
    description
    category
    condition
    priceAmount
    location
    campusSpot
    status
    createdAt
  }
}

query GetMarketListingById($listingId: String!) @auth(level: NO_ACCESS) {
  marketListing(key: { id: $listingId }) {
    id
    tenantId
    sellerUserId
    sellerUsername
    sellerName
    sellerRole
    title
    description
    category
    condition
    priceAmount
    location
    campusSpot
    status
    createdAt
    deletedAt
  }
}

