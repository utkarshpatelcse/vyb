mutation CreateMarketListing(
  $id: String!
  $tenantId: UUID!
  $sellerUserId: String!
  $sellerUsername: String!
  $sellerName: String!
  $sellerRole: String!
  $title: String!
  $description: String!
  $category: String!
  $condition: String!
  $priceAmount: Int!
  $location: String!
  $campusSpot: String!
  $createdAt: Timestamp!
) @auth(level: NO_ACCESS) @transaction {
  marketListing_insert(
    data: {
      id: $id
      tenantId: $tenantId
      sellerUserId: $sellerUserId
      sellerUsername: $sellerUsername
      sellerName: $sellerName
      sellerRole: $sellerRole
      title: $title
      description: $description
      category: $category
      condition: $condition
      priceAmount: $priceAmount
      location: $location
      campusSpot: $campusSpot
      status: "active"
      createdAt: $createdAt
      updatedAt: $createdAt
    }
  )
}

