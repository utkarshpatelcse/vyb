mutation UpdateMarketListingDetails(
  $id: String!
  $title: String!
  $description: String!
  $category: String!
  $condition: String!
  $priceAmount: Int!
  $location: String!
  $campusSpot: String!
) @auth(level: NO_ACCESS) @transaction {
  marketListing_update(
    key: { id: $id }
    data: {
      title: $title
      description: $description
      category: $category
      condition: $condition
      priceAmount: $priceAmount
      location: $location
      campusSpot: $campusSpot
      updatedAt_expr: "request.time"
    }
  )
}

mutation MarkMarketListingSold($id: String!) @auth(level: NO_ACCESS) @transaction {
  marketListing_update(
    key: { id: $id }
    data: {
      status: "sold"
      updatedAt_expr: "request.time"
    }
  )
}

mutation SoftDeleteMarketListing($id: String!) @auth(level: NO_ACCESS) @transaction {
  marketListing_update(
    key: { id: $id }
    data: {
      status: "deleted"
      deletedAt_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  )
}

mutation SoftDeleteMarketListingMedia($id: String!) @auth(level: NO_ACCESS) @transaction {
  marketListingMedia_update(
