type Course @table(name: "courses", singular: "course", plural: "courses", key: ["id"]) {
  id: UUID! @default(expr: "uuidV4()")
  tenant: Tenant!
  code: String!
  title: String!
  semester: Int
  branch: String
  createdAt: Timestamp! @col(name: "created_at") @default(expr: "request.time")
  updatedAt: Timestamp! @col(name: "updated_at") @default(expr: "request.time")
  deletedAt: Timestamp @col(name: "deleted_at")
}

type Resource @table(name: "resources", singular: "resource", plural: "resources", key: ["id"]) {
  id: UUID! @default(expr: "uuidV4()")
  tenant: Tenant!
  course: Course
  membership: TenantMembership!
  type: String! @default(value: "notes")
  title: String!
  description: String
  status: String! @default(value: "pending")
  createdAt: Timestamp! @col(name: "created_at") @default(expr: "request.time")
  updatedAt: Timestamp! @col(name: "updated_at") @default(expr: "request.time")
  deletedAt: Timestamp @col(name: "deleted_at")
}

type ResourceFile
  @table(name: "resource_files", singular: "resourceFile", plural: "resourceFiles", key: ["id"]) {
  id: UUID! @default(expr: "uuidV4()")
  resourceFileKey: String! @col(name: "resource_file_key") @unique
  tenant: Tenant!
  resource: Resource!
  storagePath: String! @col(name: "storage_path")
  fileName: String! @col(name: "file_name")
  mimeType: String! @col(name: "mime_type")
  sizeBytes: Int64! @col(name: "size_bytes")
  createdAt: Timestamp! @col(name: "created_at") @default(expr: "request.time")
  updatedAt: Timestamp! @col(name: "updated_at") @default(expr: "request.time")
  deletedAt: Timestamp @col(name: "deleted_at")
}

extend type Course {
  tenantId: UUID!
}

extend type Resource {
  tenantId: UUID!
  courseId: UUID
  membershipId: UUID!
}

extend type ResourceFile {
  tenantId: UUID!
  resourceId: UUID!
}

