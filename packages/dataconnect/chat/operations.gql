query ListChatIdentitiesByTenant($tenantId: UUID!, $limit: Int!) @auth(level: NO_ACCESS) {
  chatIdentities(
    where: {
      tenantId: { eq: $tenantId }
      deletedAt: { isNull: true }
    }
    orderBy: [{ updatedAt: DESC }]
    limit: $limit
  ) {
    id
    tenantId
    userId
    membershipId
    publicKey
    algorithm
    keyVersion
    updatedAt
  }
}

query ListChatConversationsByTenant($tenantId: UUID!, $limit: Int!) @auth(level: NO_ACCESS) {
  chatConversations(
    where: {
      tenantId: { eq: $tenantId }
      deletedAt: { isNull: true }
    }
    orderBy: [{ lastMessageAt: DESC }, { updatedAt: DESC }]
    limit: $limit
  ) {
    id
    tenantId
    conversationKey
    kind
    createdByUserId
    lastMessageId
    lastMessageAt
    createdAt
    updatedAt
  }
}

query ListChatParticipantsByMembership($membershipId: UUID!, $limit: Int!) @auth(level: NO_ACCESS) {
  chatParticipants(
    where: {
      membershipId: { eq: $membershipId }
      deletedAt: { isNull: true }
    }
    orderBy: [{ updatedAt: DESC }]
    limit: $limit
  ) {
    id
    tenantId
    conversationId
    membershipId
    userId
    lastReadMessageId
    lastReadAt
    updatedAt
  }
}

query ListChatParticipantsByConversation($conversationId: UUID!, $limit: Int!) @auth(level: NO_ACCESS) {
  chatParticipants(
    where: {
      conversationId: { eq: $conversationId }
      deletedAt: { isNull: true }
    }
    orderBy: [{ createdAt: ASC }]
    limit: $limit
  ) {
    id
    tenantId
    conversationId
    membershipId
    userId
    lastReadMessageId
    lastReadAt
    createdAt
    updatedAt
  }
}

query ListChatMessagesByConversation($conversationId: UUID!, $limit: Int!) @auth(level: NO_ACCESS) {
  chatMessages(
    where: {
      conversationId: { eq: $conversationId }
      deletedAt: { isNull: true }
    }
    orderBy: [{ createdAt: ASC }]
    limit: $limit
  ) {
    id
    tenantId
    conversationId
    senderMembershipId
    senderUserId
    senderIdentityId
    messageKind
    cipherText
    cipherIv
    cipherAlgorithm
    replyToMessageId
    attachmentUrl
    attachmentStoragePath
    attachmentMimeType
    attachmentSizeBytes
    attachmentWidth
    attachmentHeight
    attachmentDurationMs
    expiresAt
    isStarred
    isSaved
    createdAt
    updatedAt
  }
}

query ListChatMessageReactionsByConversation($conversationId: UUID!, $limit: Int!) @auth(level: NO_ACCESS) {
  chatMessageReactions(
    where: {
      message: { conversationId: { eq: $conversationId } }
      deletedAt: { isNull: true }
    }
    orderBy: [{ createdAt: DESC }]
    limit: $limit
  ) {
    id
    tenantId
    messageId
    membershipId
    emoji
    createdAt
    updatedAt
  }
}

query ListExpiredChatMessages($now: Timestamp!, $limit: Int!) @auth(level: NO_ACCESS) {
  chatMessages(
    where: {
      deletedAt: { isNull: true }
      expiresAt: { le: $now }
    }
    orderBy: [{ expiresAt: ASC }]
    limit: $limit
  ) {
    id
    tenantId
    conversationId
    senderUserId
    attachmentStoragePath
  }
}

mutation CreateChatMessage(
  $id: UUID!
  $tenantId: UUID!
  $conversationId: UUID!
  $senderMembershipId: UUID!
  $senderUserId: UUID!
  $senderIdentityId: UUID!
  $messageKind: String!
  $cipherText: String!
  $cipherIv: String!
  $cipherAlgorithm: String!
  $replyToMessageId: UUID
  $attachmentUrl: String
  $attachmentStoragePath: String
  $attachmentMimeType: String
  $attachmentSizeBytes: Int64
  $attachmentWidth: Int
  $attachmentHeight: Int
  $attachmentDurationMs: Int
  $expiresAt: Timestamp
  $isSaved: Boolean!
) @auth(level: NO_ACCESS) {
  chatMessage_insert(
    data: {
      id: $id
      tenantId: $tenantId
      conversationId: $conversationId
      senderMembershipId: $senderMembershipId
      senderUserId: $senderUserId
      senderIdentityId: $senderIdentityId
      messageKind: $messageKind
      cipherText: $cipherText
      cipherIv: $cipherIv
      cipherAlgorithm: $cipherAlgorithm
      replyToMessageId: $replyToMessageId
      attachmentUrl: $attachmentUrl
      attachmentStoragePath: $attachmentStoragePath
      attachmentMimeType: $attachmentMimeType
      attachmentSizeBytes: $attachmentSizeBytes
      attachmentWidth: $attachmentWidth
      attachmentHeight: $attachmentHeight
      attachmentDurationMs: $attachmentDurationMs
      expiresAt: $expiresAt
      isSaved: $isSaved
      isStarred: false
    }
  )
}

mutation UpdateChatMessageLifecycle(
  $id: UUID!
  $expiresAt: Timestamp
  $isStarred: Boolean!
  $isSaved: Boolean!
) @auth(level: NO_ACCESS) {
  chatMessage_update(
    key: { id: $id }
    data: {
      expiresAt: $expiresAt
      isStarred: $isStarred
      isSaved: $isSaved
      updatedAt_expr: "request.time"
    }
  )
}
