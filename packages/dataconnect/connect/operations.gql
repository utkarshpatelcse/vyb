query ListConnectSessionsByTenant($tenantId: String!, $limit: Int!) @auth(level: NO_ACCESS) {
  connectSessions(
    where: { tenantId: { eq: $tenantId }, deletedAt: { isNull: true } }
    orderBy: [{ startedAt: DESC }]
    limit: $limit
  ) {
    id
    sessionKey
    sessionId
    tenantId
    userId
    username
    displayName
    levelId
    dailyIndex
    dailyKey
    startedAt
    lastHintAt
    hintsUsed
    completedAt
    elapsedCentiseconds
    adjustedCentiseconds
  }
}

query ListConnectScoresByTenant($tenantId: String!, $limit: Int!) @auth(level: NO_ACCESS) {
  connectScores(
    where: { tenantId: { eq: $tenantId }, deletedAt: { isNull: true } }
    orderBy: [{ completedAt: DESC }]
    limit: $limit
  ) {
    id
    scoreKey
    sessionId
    tenantId
    userId
    username
    displayName
    levelId
    dailyIndex
    dailyKey
    startedAt
    completedAt
    elapsedCentiseconds
    hintsUsed
    adjustedCentiseconds
  }
}

query GetConnectSessionByKey($sessionKey: String!) @auth(level: NO_ACCESS) {
  connectSessions(where: { sessionKey: { eq: $sessionKey }, deletedAt: { isNull: true } }, limit: 1) {
    id
  }
}

query GetConnectScoreByKey($scoreKey: String!) @auth(level: NO_ACCESS) {
  connectScores(where: { scoreKey: { eq: $scoreKey }, deletedAt: { isNull: true } }, limit: 1) {
    id
    adjustedCentiseconds
    elapsedCentiseconds
    hintsUsed
    completedAt
  }
}

mutation CreateConnectSession(
