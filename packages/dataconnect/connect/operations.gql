  $sessionId: String!
  $tenantId: String!
  $userId: String!
  $username: String!
  $displayName: String!
  $levelId: Int!
  $dailyIndex: Int!
  $dailyKey: String!
  $startedAt: Timestamp!
  $lastHintAt: Timestamp
  $hintsUsed: Int!
  $completedAt: Timestamp
  $elapsedCentiseconds: Int
  $adjustedCentiseconds: Int
) @auth(level: NO_ACCESS) @transaction {
  connectSession_insert(
    data: {
      id: $id
      sessionKey: $sessionKey
      sessionId: $sessionId
      tenantId: $tenantId
      userId: $userId
      username: $username
      displayName: $displayName
      levelId: $levelId
      dailyIndex: $dailyIndex
      dailyKey: $dailyKey
      startedAt: $startedAt
      lastHintAt: $lastHintAt
      hintsUsed: $hintsUsed
      completedAt: $completedAt
      elapsedCentiseconds: $elapsedCentiseconds
      adjustedCentiseconds: $adjustedCentiseconds
