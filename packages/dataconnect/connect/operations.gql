query GetGameLevel($id: String!) @auth(level: NO_ACCESS) {
  gamesLevel(key: { id: $id }) {
    id
    payloadJson
    totalLevels
    launchDate
    checksum
    updatedAt
  }
}

mutation CreateGameLevel(
  $id: String!
  $payloadJson: String!
  $totalLevels: Int!
  $launchDate: String
  $checksum: String
) @auth(level: NO_ACCESS) @transaction {
  gamesLevel_insert(
    data: {
      id: $id
      payloadJson: $payloadJson
      totalLevels: $totalLevels
      launchDate: $launchDate
      checksum: $checksum
      createdAt_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  )
}

mutation UpdateGameLevel(
  $id: String!
  $payloadJson: String!
  $totalLevels: Int!
  $launchDate: String
  $checksum: String
) @auth(level: NO_ACCESS) @transaction {
  gamesLevel_update(
    key: { id: $id }
    data: {
      payloadJson: $payloadJson
      totalLevels: $totalLevels
      launchDate: $launchDate
      checksum: $checksum
      updatedAt_expr: "request.time"
    }
  )
}

