query GetTenantByDomain($domain: String!) @auth(level: NO_ACCESS) {
  tenantDomains(where: { domain: { eq: $domain }, deletedAt: { isNull: true } }, limit: 1) {
    id
    domain
    verificationMode
    tenant {
      id
      name
      slug
      status
    }
  }
}

query GetTenantBySlug($slug: String!) @auth(level: NO_ACCESS) {
  tenants(where: { slug: { eq: $slug }, deletedAt: { isNull: true } }, limit: 1) {
    id
    name
    slug
    status
  }
}

query GetMembershipContext($userId: UUID!, $tenantId: UUID!) @auth(level: NO_ACCESS) {
  tenantMemberships(
    where: { userId: { eq: $userId }, tenantId: { eq: $tenantId }, deletedAt: { isNull: true } }
    limit: 1
  ) {
    id
    role
    verificationStatus
    branch
    batchYear
    hostel
    tenant {
      id
      name
      slug
    }
    user {
      id
      displayName
      primaryEmail
    }
  }
}

query ListCommunitiesByTenant($tenantId: UUID!) @auth(level: NO_ACCESS) {
  communities(
    where: { tenantId: { eq: $tenantId }, deletedAt: { isNull: true } }
    orderBy: [{ name: ASC }]
  ) {
    id
    name
    slug
    type
    visibility
    tenantId
  }
}

query GetCommunityBySlug($tenantId: UUID!, $slug: String!) @auth(level: NO_ACCESS) {
  communities(
    where: { tenantId: { eq: $tenantId }, slug: { eq: $slug }, deletedAt: { isNull: true } }
    limit: 1
  ) {
    id
    name
    slug
    type
    visibility
    tenantId
  }
}

query ListCommunitiesForMembership($membershipId: UUID!) @auth(level: NO_ACCESS) {
  communityMemberships(
    where: { membershipId: { eq: $membershipId }, deletedAt: { isNull: true } }
    orderBy: [{ joinedAt: ASC }]
  ) {
    id
    role
    joinedAt
    community {
      id
      name
      slug
      type
      visibility
      tenantId
    }
  }
}

query GetTenantMembershipProfileByUserAndTenant($tenantId: UUID!, $userId: UUID!) @auth(level: NO_ACCESS) {
  tenantMemberships(
    where: {
      tenantId: { eq: $tenantId }
      userId: { eq: $userId }
      deletedAt: { isNull: true }
    }
    limit: 1
  ) {
    id
    tenantId
    userId
    role
    verificationStatus
    username
    usernameKey
    firstName
    lastName
    fullName
    course
    branch
    batchYear
    hostel
    section
    phoneNumber
    profileCompleted
    createdAt
    updatedAt
    tenant {
      id
      name
      slug
    }
    user {
      id
      primaryEmail
      displayName
    }
  }
}

query GetTenantMembershipProfileByUsername($tenantId: UUID!, $usernameKey: String!) @auth(level: NO_ACCESS) {
  tenantMemberships(
    where: {
      tenantId: { eq: $tenantId }
      usernameKey: { eq: $usernameKey }
      profileCompleted: { eq: true }
      deletedAt: { isNull: true }
    }
    limit: 1
  ) {
    id
    tenantId
    userId
    role
    verificationStatus
    username
    usernameKey
    firstName
    lastName
    fullName
    course
    branch
    batchYear
    hostel
    section
    phoneNumber
    profileCompleted
    createdAt
    updatedAt
    tenant {
      id
      name
      slug
    }
    user {
      id
      primaryEmail
      displayName
    }
  }
}

query ListTenantMembershipProfilesByTenant($tenantId: UUID!, $limit: Int!) @auth(level: NO_ACCESS) {
  tenantMemberships(
    where: {
      tenantId: { eq: $tenantId }
      profileCompleted: { eq: true }
      deletedAt: { isNull: true }
    }
    orderBy: [{ updatedAt: DESC }]
    limit: $limit
  ) {
    id
    tenantId
    userId
    role
    verificationStatus
    username
    usernameKey
    firstName
    lastName
    fullName
    course
    branch
    batchYear
    hostel
    section
    phoneNumber
    profileCompleted
    createdAt
    updatedAt
    tenant {
      id
      name
      slug
    }
    user {
      id
      primaryEmail
      displayName
    }
  }
}

mutation CreateTenant($name: String!, $slug: String!, $status: String!) @auth(level: NO_ACCESS) @transaction {
  tenant_insert(
    data: {
      name: $name
      slug: $slug
      status: $status
      createdAt_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  )
}

mutation CreateTenantDomain(
  $tenantDomainKey: String!
  $tenantId: UUID!
  $domain: String!
  $isPrimary: Boolean!
  $verificationMode: String!
) @auth(level: NO_ACCESS) @transaction {
  tenantDomain_insert(
    data: {
      tenantDomainKey: $tenantDomainKey
      tenantId: $tenantId
      domain: $domain
      isPrimary: $isPrimary
      verificationMode: $verificationMode
      createdAt_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  )
}

