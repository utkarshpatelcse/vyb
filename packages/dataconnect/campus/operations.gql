mutation UpdateTenantMembershipProfile(
  $id: UUID!
  $username: String!
  $usernameKey: String!
  $firstName: String!
  $lastName: String
  $fullName: String!
  $course: String!
  $branch: String!
  $batchYear: Int!
  $hostel: String
  $section: String!
  $phoneNumber: String
) @auth(level: NO_ACCESS) @transaction {
  tenantMembership_update(
    key: { id: $id }
    data: {
      username: $username
      usernameKey: $usernameKey
      firstName: $firstName
      lastName: $lastName
      fullName: $fullName
      course: $course
      branch: $branch
      batchYear: $batchYear
      hostel: $hostel
      section: $section
      phoneNumber: $phoneNumber
      profileCompleted: true
      updatedAt_expr: "request.time"
    }
  )
}

mutation UpdateTenantMembershipUsername(
  $id: UUID!
  $username: String!
  $usernameKey: String!
) @auth(level: NO_ACCESS) @transaction {
  tenantMembership_update(
    key: { id: $id }
    data: {
      username: $username
      usernameKey: $usernameKey
      updatedAt_expr: "request.time"
    }
  )
}
