query ListUserActivityByMembership(
  $tenantId: UUID!
  $membershipId: UUID!
  $limit: Int!
) @auth(level: NO_ACCESS) {
  userActivities(
    where: {
      tenantId: { eq: $tenantId }
      membershipId: { eq: $membershipId }
      deletedAt: { isNull: true }
    }
    orderBy: [{ createdAt: DESC }]
    limit: $limit
  ) {
    id
    tenantId
    membershipId
    activityType
    entityType
    entityId
    metadataJson
    createdAt
    updatedAt
  }
}

query ListReportsByTenant($tenantId: UUID!, $limit: Int!) @auth(level: NO_ACCESS) {
  reports(
    where: { tenantId: { eq: $tenantId }, deletedAt: { isNull: true } }
    orderBy: [{ createdAt: DESC }]
    limit: $limit
  ) {
    id
    tenantId
    membershipId
    targetType
    targetId
    reason
    status
    createdAt
    updatedAt
  }
}

query ListModerationCasesByTenant($tenantId: UUID!, $limit: Int!) @auth(level: NO_ACCESS) {
  moderationCases(
    where: { tenantId: { eq: $tenantId }, deletedAt: { isNull: true } }
    orderBy: [{ createdAt: DESC }]
    limit: $limit
  ) {
    id
    tenantId
    reportId
    assignedUserId
    decision
    notes
    resolvedAt
    createdAt
    updatedAt
  }
